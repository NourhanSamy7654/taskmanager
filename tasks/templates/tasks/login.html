{% extends 'tasks/base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg border-0 rounded-4 p-4 bg-dark text-light">

                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right display-5 text-info"></i>

                    <h2 class="fw-bold mt-2">
                        Welcome Back
                    </h2>

                    <p class="text-secondary">
                        Login to continue managing your tasks
                    </p>
                </div>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>

                        {{ form.username }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Password
                        </label>

                        {{ form.password }}
                    </div>

                    <button type="submit"
                            class="btn btn-info w-100 rounded-pill py-2 fw-semibold">
                        Login
                    </button>

                </form>

                <div class="text-center mt-4">
                    <span class="text-secondary">
                        Don’t have an account?
                    </span>

                    <a href="{% url 'register' %}"
                       class="text-info text-decoration-none fw-semibold">
                        Register
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
