{% extends 'tasks/base.html' %}
{% block content %}

<div class="modal show d-block" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">

            <div class="modal-header bg-danger text-white border-0">
                <h5 class="modal-title">Delete Task</h5>
            </div>

            <form method="post" action="{% url 'tasks:delete_task' task.pk %}">
                {% csrf_token %}

                <div class="modal-body text-center p-4">
                    <p class="mb-0 fs-5 text-secondary">
                        Are you sure you want to delete
                        <span class="fw-bold text-danger">
                            "{{ task.title }}"
                        </span>
                        ?
                    </p>
                </div>

                <div class="modal-footer border-0 justify-content-center gap-2 p-3">
                    <button type="submit" class="btn btn-danger px-4 rounded-3">
                        Yes, Delete
                    </button>

                    <a href="{% url 'tasks:task_list' %}" class="btn btn-secondary px-4 rounded-3">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
