{% extends 'tasks/base.html' %}

{% block content %}

<style>

    .form-wrapper{
        max-width: 750px;
        margin: auto;
    }

    .glass-card{
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .form-title{
        color: white;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
    }

    .form-label{
        color: #e2e8f0;
        font-weight: 500;
        margin-bottom: 10px;
    }

    .glass-card input,
    .glass-card textarea,
    .glass-card select{
        width: 100%;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 14px 16px;
        color: white;
        outline: none;
        transition: 0.3s ease;
    }

    .glass-card textarea{
        min-height: 140px;
        resize: none;
    }

    .glass-card input:focus,
    .glass-card textarea:focus,
    .glass-card select:focus{
        border-color: #38bdf8;
        box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
        background: rgba(255,255,255,0.12);
    }

    .glass-card input::placeholder,
    .glass-card textarea::placeholder{
        color: #cbd5e1;
    }

    .errorlist{
        list-style: none;
        padding: 0;
        margin-top: 8px;
        color: #f87171;
        font-size: 0.9rem;
    }

    .btn-custom{
        border-radius: 50px;
        padding: 10px 28px;
        font-weight: 500;
        transition: 0.3s ease;
    }

    .btn-custom:hover{
        transform: translateY(-2px);
    }

</style>

<div class="container py-5">

    <div class="form-wrapper">

        <div class="glass-card">

            <h2 class="form-title">
                <i class="bi bi-pencil-square"></i>
                {{ action }} Task
            </h2>

            <form method="post">

                {% csrf_token %}

                <!-- Title -->
                <div class="mb-4">
                    <label class="form-label">
                        Title
                    </label>

                    {{ form.title }}

                    {{ form.title.errors }}
                </div>

                <!-- Description -->
                <div class="mb-4">

                    <label class="form-label">
                        Description
                    </label>

                    {{ form.description }}

                    {{ form.description.errors }}

                </div>

                <!-- Priority -->
                <div class="mb-4">

                    <label class="form-label">
                        Priority
                    </label>

                    {{ form.priority }}

                </div>

                <!-- Status -->
                <div class="mb-4">

                    <label class="form-label">
                        Status
                    </label>

                    {{ form.status }}

                </div>

                <!-- Due Date -->
                <div class="mb-4">

                    <label class="form-label">
                        Due Date
                    </label>

                    {{ form.due_date }}

                    {{ form.due_date.errors }}

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-4">

                    <a href="{% url 'tasks:task_list' %}"
                       class="btn btn-secondary btn-custom">

                        <i class="bi bi-arrow-left"></i>
                        Cancel

                    </a>

                    <button type="submit"
                            class="btn btn-info text-white btn-custom">

                        <i class="bi bi-check2-circle"></i>
                        {{ action }}

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
